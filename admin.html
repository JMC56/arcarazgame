<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ADMIN PANEL</title>

<style>
@font-face{
  font-family:'Minecraft';
  src:url('/assets/fonts/Minecraft.ttf');
}

body{
  margin:0;
  background:radial-gradient(circle,#000,#020617);
  color:#00ffff;
  font-family:'Minecraft';
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* PANEL */
.panel{
  background:rgba(0,0,0,0.8);
  border:2px solid #00ffff;
  box-shadow:0 0 25px #00ffff;
  padding:30px;
  width:350px;
  text-align:center;
  border-radius:10px;
}

/* TITULO */
h2{
  margin-bottom:20px;
  text-shadow:0 0 10px #00ffff;
}

/* INPUT */
input, select{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  background:black;
  border:2px solid #00ffff;
  color:white;
  font-family:'Minecraft';
}

/* BOTON */
button{
  width:100%;
  padding:15px;
  background:#00ffff;
  color:black;
  border:none;
  font-family:'Minecraft';
  cursor:pointer;
  box-shadow:0 0 15px #00ffff;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

/* EFECTO HACKER */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(transparent,rgba(0,255,255,0.05));
  pointer-events:none;
}
</style>
</head>

<body>

<div class="panel">
  <h2>ANUNCIO GLOBAL</h2>

  <input id="mensaje" placeholder="Mensaje...">

  <select id="avatar">
    <option value="/assets/avatar1.png">Avatar 1</option>
    <option value="/assets/avatar2.png">Avatar 2</option>
  </select>

  <select id="fondo">
    <option value="/assets/fondo1.jpg">Fondo 1</option>
    <option value="/assets/fondo2.jpg">Fondo 2</option>
  </select>

  <button onclick="enviar()">ENVIAR</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBP-twUwMdVbG-SKWsWCxzssROI64bzkdI",
  authDomain: "kodegames-6df40.firebaseapp.com",
  projectId: "kodegames-6df40",
  storageBucket: "kodegames-6df40.firebasestorage.app",
  messagingSenderId: "394434413800",
  appId: "1:394434413800:web:053531e404f1396f09b55d",
  measurementId: "G-J8R3GT190D"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function enviar(){
  await setDoc(doc(db, "global", "anuncio"), {
    texto: document.getElementById("mensaje").value,
    avatar: document.getElementById("avatar").value,
    fondo: document.getElementById("fondo").value,
    time: Date.now()
  });

  alert("ANUNCIO ENVIADO ⚡");
}
</script>

</body>
</html>
