<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ADMIN PANEL</title>

<style>
@font-face{
  font-family:'Minecraft';
  src:url('/assets/fonts/Minecraft.ttf');
}

body{
  margin:0;
  background:#000;
  color:#00ffff;
  font-family:'Minecraft';
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.panel{
  background:rgba(0,0,0,0.9);
  border:2px solid #00ffff;
  padding:30px;
  width:350px;
  text-align:center;
  box-shadow:0 0 25px #00ffff;
}

input, select{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  background:black;
  border:2px solid #00ffff;
  color:white;
  font-family:'Minecraft';
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  font-family:'Minecraft';
  cursor:pointer;
}

#btnEnviar{
  background:#00ffff;
  color:black;
}

#btnQuitar{
  background:#ff4444;
  color:white;
}

#estado{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="panel">
  <h2>ANUNCIO GLOBAL</h2>

  <input id="mensaje" placeholder="Mensaje...">

  <select id="fondo">
    <option value="/assets/fondo1.jpg">Fondo 1</option>
    <option value="/assets/fondo2.jpg">Fondo 2</option>
  </select>

  <button id="btnEnviar">ENVIAR</button>
  <button id="btnQuitar">QUITAR ANUNCIO</button>

  <div id="estado"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBP-twUwMdVbG-SKWsWCxzssROI64bzkdI",
  authDomain: "kodegames-6df40.firebaseapp.com",
  projectId: "kodegames-6df40",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const mensaje = document.getElementById("mensaje");
const fondo = document.getElementById("fondo");
const estado = document.getElementById("estado");

document.getElementById("btnEnviar").addEventListener("click", enviar);
document.getElementById("btnQuitar").addEventListener("click", quitar);

async function enviar(){
  await setDoc(doc(db, "global", "anuncio"), {
    texto: mensaje.value,
    avatar: "/assets/avatar.png",
    fondo: fondo.value,
    activo: true,
    time: Date.now()
  });

  estado.innerText = "ANUNCIO ENVIADO ⚡";
}

async function quitar(){
  await setDoc(doc(db, "global", "anuncio"), {
    activo: false,
    time: Date.now()
  });

  estado.innerText = "ANUNCIO ELIMINADO ❌";
}
</script>

</body>
</html>
