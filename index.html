<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcaraz Game - Real Look</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000212;
            --neon-blue: #00f2ff;
            --pixel-green: #58c085;
            --pixel-blue: #3b59ff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-dark);
            /* Gradiente de fondo más profundo */
            background-image: radial-gradient(circle at center, #001a4d 0%, #000212 100%);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }

        /* EFECTO DE TEXTURA DIGITAL (RUIDO Y SCANLINES) */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 2px 100%;
            z-index: 100;
            pointer-events: none;
        }

        .container { text-align: center; z-index: 5; }

        /* ARCARAZ GIGANTE CON EFECTO PUNTEADO */
        .title-arcaraz {
            font-size: 6.5rem;
            margin: 0;
            color: var(--neon-blue);
            text-transform: uppercase;
            /* Brillo masivo (Bloom) */
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.7), 
                         0 0 30px rgba(0, 100, 255, 0.5),
                         0 0 60px rgba(0, 50, 255, 0.3);
            letter-spacing: -2px;
            background: linear-gradient(var(--neon-blue), #008cff);
            -webkit-background-clip: text;
            position: relative;
        }

        .title-game {
            font-size: 1.8rem;
            color: var(--neon-blue);
            margin-top: 30px;
            letter-spacing: 15px;
            text-shadow: 0 0 10px var(--neon-blue);
            opacity: 0.8;
        }

        .ui-row { display: flex; align-items: center; gap: 40px; margin-top: 60px; }

        a { text-decoration: none; }

        /* BOTONES ESTILO IMAGEN 2 (BORDE GRIS GRUESO) */
        .btn-outer {
            background: #000;
            padding: 5px;
            border-radius: 12px;
        }

        .btn-base {
            background: #d1d5db; /* El gris de la imagen */
            padding: 10px;
            border-radius: 8px;
            border-bottom: 8px solid #9ca3af;
        }

        .pixel-btn {
            border: 4px solid #000;
            padding: 20px 45px;
            font-family: 'Press Start 2P';
            font-size: 1.5rem;
            color: white;
            cursor: pointer;
            text-shadow: -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000;
            transition: 0.1s;
        }

        .juega { background: var(--pixel-green); border-bottom: 6px solid #3d8c5b; }
        .sufre { background: var(--pixel-blue); border-bottom: 6px solid #1e3a8a; }

        .btn-outer:active { transform: translateY(4px); }

        .divider {
            background: #111;
            border: 4px solid #000;
            padding: 15px;
            color: #4ade80;
            font-size: 2rem;
        }

        @media (max-width: 900px) {
            .title-arcaraz { font-size: 3rem; }
            .ui-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title-arcaraz">ARCARAZ</h1>
        <div class="title-game">GAME</div>

        <div class="ui-row">
            <a href="game.html">
                <div class="btn-outer">
                    <div class="btn-base">
                        <div class="pixel-btn juega">JUEGA</div>
                    </div>
                </div>
            </a>

            <div class="divider">O</div>

            <a href="sufre.html">
                <div class="btn-outer">
                    <div class="btn-base">
                        <div class="pixel-btn sufre">SUFRE</div>
                    </div>
                </div>
            </a>
        </div>
    </div>

</body>
</html>
