<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcaraz Game - Pixel UI Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000212;
            --neon-blue: #00f2ff;
            --pixel-green: #58c085;
            --pixel-blue: #3b59ff;
            --base-grey: #d1d5db;
        }

        body, html {
            margin: 0; 
            padding: 0; 
            height: 100%;
            background-color: var(--bg-dark);
            /* RESTAURADO: Gradiente de fondo profundo */
            background-image: radial-gradient(circle at center, #001a4d 0%, #000212 100%);
            display: flex; 
            justify-content: center; 
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }

        /* RESTAURADO: Efecto de textura digital (scanlines) sutil */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 2px 100%;
            z-index: 100;
            pointer-events: none;
            opacity: 0.8;
        }

        .container { 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        /* RESTAURADO: Título ARCARAZ Masivo con Resplandor (Bloom) */
        .title-arcaraz {
            font-size: 7rem;
            margin: 0;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: -2px;
            /* Brillo masivo y parpadeo de tu diseño original */
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.8), 
                         0 0 30px rgba(0, 100, 255, 0.6),
                         0 0 60px rgba(0, 50, 255, 0.4);
            animation: textFlicker 3s infinite alternate;
        }

        /* RESTAURADO: GAME Separado y con resplandor */
        .title-game {
            font-size: 1.8rem;
            color: var(--neon-blue);
            margin-top: 25px; /* Pequeña separación */
            letter-spacing: 15px;
            text-shadow: 0 0 10px var(--neon-blue);
            opacity: 0.9;
        }

        .ui-row { 
            display: flex; 
            align-items: center; 
            gap: 45px; 
            margin-top: 60px; 
        }

        a { text-decoration: none; color: inherit; }

        /* BOTONES COMO IMAGEN 2 CON DELINEADO NEGRO */
        .btn-outer {
            background: #000; /* Delineado negro exterior de todo el conjunto */
            padding: 5px;
            border-radius: 14px;
            display: inline-block;
        }

        .btn-base {
            background: var(--base-grey); 
            padding: 12px;
            border-radius: 10px;
            border-bottom: 10px solid #9ca3af; /* Sombra de la base gris */
        }

        .pixel-btn {
            border: 5px solid #000; /* DELINEADO NEGRO DEL BOTON INTERNO */
            padding: 22px 45px;
            font-family: 'Press Start 2P';
            font-size: 1.8rem;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            /* DELINEADO NEGRO EN LAS LETRAS (Stroke) */
            text-shadow: 
                -3px -3px 0 #000,  
                 3px -3px 0 #000,
                -3px  3px 0 #000,
                 3px  3px 0 #000;
            transition: all 0.1s ease;
        }

        .juega { background: var(--pixel-green); border-bottom: 8px solid #3d8c5b; }
        .sufre { background: var(--pixel-blue); border-bottom: 8px solid #1e3a8a; }

        /* Efecto de presionar */
        .btn-outer:active { transform: translateY(4px); }

        /* SEPARADOR */
        .divider {
            background: #111;
            border: 4px solid #000;
            padding: 15px 20px;
            color: #66cc88;
            font-size: 2.2rem;
            box-shadow: inset 0 0 10px #000;
        }

        /* Animación de parpadeo original */
        @keyframes textFlicker {
            0% { opacity: 1; }
            100% { opacity: 0.95; }
        }

        @media (max-width: 900px) {
            .title-arcaraz { font-size: 3.5rem; }
            .title-game { font-size: 1rem; }
            .ui-row { flex-direction: column; gap: 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 class="title-arcaraz">ARCARAZ</h1>
            <div class="title-game">GAME</div>
        </div>

        <div class="ui-row">
            <a href="game.html">
                <div class="btn-outer">
                    <div class="btn-base">
                        <div class="pixel-btn juega">JUEGA</div>
                    </div>
                </div>
            </a>

            <div class="divider">O</div>

            <a href="sufre.html">
                <div class="btn-outer">
                    <div class="btn-base">
                        <div class="pixel-btn sufre">SUFRE</div>
                    </div>
                </div>
            </a>
        </div>
    </div>

</body>
</html>
