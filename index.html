<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcaraz Game - Pixel UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #00041a;
            --neon-blue: #00ffff;
            --pixel-green: #66cc88;
            --pixel-blue: #1d4ed8;
            --base-plate: #d1d5db;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #001f4d 0%, var(--bg-dark) 85%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
        }

        /* --- TÍTULO GIGANTE --- */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-arcaraz {
            font-size: 6.5rem;
            color: var(--neon-blue);
            text-shadow: 0 0 25px #00bfff, 0 0 50px #0057ff;
            margin: 0;
            letter-spacing: -2px;
        }

        .title-game {
            font-size: 1.8rem;
            color: var(--neon-blue);
            margin-top: 25px; /* SEPARACIÓN DE GAME */
            letter-spacing: 12px;
            text-shadow: 0 0 10px #00bfff;
            opacity: 0.9;
        }

        /* --- FILA DE BOTONES --- */
        .ui-row {
            display: flex;
            align-items: center;
            gap: 45px;
        }

        /* --- ENLACES (QUITAR DECORACIÓN) --- */
        a {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        /* --- BOTONES CON DELINEADO NEGRO --- */
        .btn-wrapper {
            background-color: #000;
            padding: 6px;
            border-radius: 14px;
            transition: transform 0.1s;
        }

        .btn-wrapper:hover {
            transform: scale(1.05);
        }

        .btn-base {
            background-color: var(--base-plate);
            padding: 12px;
            border-radius: 10px;
            border-bottom: 10px solid #9ca3af;
        }

        .pixel-button {
            border: 5px solid #000; 
            padding: 22px 45px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.8rem;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            text-shadow: 
                -4px -4px 0 #000,  
                 4px -4px 0 #000,
                -4px  4px 0 #000,
                 4px  4px 0 #000;
        }

        .btn-juega {
            background-color: var(--pixel-green);
            border-bottom: 8px solid #3d8c5b;
        }

        .btn-sufre {
            background-color: var(--pixel-blue);
            border-bottom: 8px solid #1e3a8a;
        }

        .btn-wrapper:active {
            transform: translateY(4px);
        }

        /* --- SEPARADOR O --- */
        .divider-box {
            background: #111;
            border: 4px solid #000;
            padding: 15px 20px;
            color: #66cc88;
            font-size: 2.2rem;
            box-shadow: inset 0 0 15px #000;
        }

        @media (max-width: 900px) {
            .title-arcaraz { font-size: 3.5rem; }
            .ui-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 class="title-arcaraz">ARCARAZ</h1>
            <div class="title-game">GAME</div>
        </div>

        <div class="ui-row">
            <a href="game.html">
                <div class="btn-wrapper">
                    <div class="btn-base">
                        <div class="pixel-button btn-juega">JUEGA</div>
                    </div>
                </div>
            </a>

            <div class="divider-box">O</div>

            <a href="sufre.html">
                <div class="btn-wrapper">
                    <div class="btn-base">
                        <div class="pixel-button btn-sufre">SUFRE</div>
                    </div>
                </div>
            </a>
        </div>
    </div>

</body>
</html>
